<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- OG card · 1200×630 · Tallinn ·
       Per brand/IMPLEMENTATION.md § City plates: the city plate is the
       hero (~800×533 centered), wordmark below. The plate already carries
       the country flag + lime accent, so no extra brand chrome competes. -->

  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- City plate centered as the hero. xlink:href used for older
       rasterizer compatibility; modern resvg / sharp follow both. -->
  <image x="200" y="48" width="800" height="533"
         href="../../assets/tallinn-overview.svg"
         xlink:href="../../assets/tallinn-overview.svg"/>

  <!-- Top-left: brand mark + wordmark. Logo tile + diamond inlined so
       the OG renders even when the plate fetch fails. -->
  <g transform="translate(40 40)">
    <rect width="48" height="48" rx="8.64" fill="#055959"/>
    <rect x="19.2" y="19.2" width="9.6" height="9.6" rx="1.15"
          fill="#d2dc50" transform="rotate(45 24 24)"/>
  </g>
  <text x="104" y="74" fill="#0a0a0c"
        font-family="Geist, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-weight="600" font-size="32" letter-spacing="-1">WanderAlt</text>

  <!-- Top-right: city name in mono caps. -->
  <text x="1160" y="74" fill="#055959"
        font-family="Geist Mono, ui-monospace, monospace"
        font-weight="500" font-size="22" letter-spacing="4"
        text-anchor="end">TALLINN — LIVE</text>

  <!-- Hairline rule + tagline at bottom. -->
  <line x1="40" y1="601" x2="1160" y2="601" stroke="#e7e5e4" stroke-width="1"/>
</svg>
