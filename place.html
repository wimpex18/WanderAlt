<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WanderAlt — Place</title>
  <meta name="description" content="An alternative-culture place in the city." />
  <meta name="theme-color" content="#055959" />
  <link rel="icon" type="image/svg+xml" href="./brand/favicon/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="./brand/favicon/apple-touch-icon.png" />
  <link rel="mask-icon" href="./brand/favicon/safari-pinned-tab.svg" color="#055959" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="canonical" href="https://wanderalt.app/place.html" />


  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="./catalog.js"></script>
  <script defer src="./city.js"></script>
  <script defer src="./supabase.js"></script>
  <script defer src="./auth.js"></script>
  <script defer src="./bookmark.js"></script>
  <script defer src="./view-transition.js"></script>
  <script defer src="./place.js"></script>
</head>
<body data-page="discover">

  <a class="skip-link" href="#place-main">Skip to place</a>

  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="./index.html" class="topbar__brand" aria-label="WanderAlt home">
        <span class="logo-mark" aria-hidden="true"><span class="logo-mark__diamond"></span></span>
        <span class="wordmark">WanderAlt</span>
      </a>
      <button class="city-selector" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="city-dot" aria-hidden="true"></span>
        <span class="city-selector__name">TALLINN</span>
        <span class="city-selector__chev" aria-hidden="true">
          <svg viewBox="0 0 10 10"><path d="M1.5 3.5 L5 7 L8.5 3.5" /></svg>
        </span>
      </button>
    </div>
  </header>

  <!-- Content injected by place.js once catalog + venues are ready. -->
  <main id="place-main" class="page" role="main">
    <p class="loading-line loading-line--page" aria-live="polite">Loading&hellip;</p>
    <noscript>
      <style>.loading-line{display:none}</style>
      <p class="empty-line">This place page needs JavaScript to load.
        <a href="./discover.html">Browse places &rarr;</a></p>
    </noscript>
  </main>

  <nav class="nav" aria-label="Primary">
    <div class="nav__inner">      <a class="nav__item" data-nav="briefing" href="./index.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M5 3h11l3 3v15H5V3z" />
          <path d="M8 8h8M8 12h8M8 16h5" />
        </svg>
        <span class="nav__label">Today</span>
      </a>
      <a class="nav__item" data-nav="discover" href="./discover.html" aria-current="page">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="11" cy="11" r="6" />
          <path d="M20 20l-4.5-4.5" />
        </svg>
        <span class="nav__label">Discover</span>
      </a>
      <a class="nav__item" data-nav="saved" href="./saved.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M6 3h12v18l-6-4-6 4V3z" />
        </svg>
        <span class="nav__label">Saved</span>
      </a>
      <a class="nav__item" data-nav="profile" href="./profile.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M5 20c0-4 3.1-7 7-7s7 3 7 7" />
        </svg>
        <span class="nav__label">Profile</span>
      </a>    </div>
  </nav>

</body>
</html>
