<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WanderAlt — Discover · Tallinn</title>
  <meta name="description" content="Browse, filter and search every curated pick in WanderAlt." />
  <meta name="theme-color" content="#055959" />
  <link rel="icon" type="image/svg+xml" href="./brand/favicon/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="./brand/favicon/apple-touch-icon.png" />
  <link rel="mask-icon" href="./brand/favicon/safari-pinned-tab.svg" color="#055959" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="canonical" href="https://wanderalt.app/discover.html" />

  <!-- Preload Discover's above-the-fold faces (Geist body + 600 for the
       scope switch / titles). crossorigin required even same-origin. -->
  <link rel="preload" as="font" type="font/woff2" href="fonts/geist-400.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="fonts/geist-600.woff2" crossorigin />

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script defer src="./catalog.js"></script>
  <script defer src="./city.js"></script>
  <script defer src="./supabase.js"></script>
  <script defer src="./auth.js"></script>
  <script defer src="./bookmark.js"></script>
  <script defer src="./taste.js"></script>
  <script defer src="./mood-chips.js"></script>
  <script defer src="./map-venues.js"></script>
  <script defer src="./map-tiles.js"></script>
  <script defer src="./map.js"></script>
  <script defer src="./discover.js"></script>
</head>
<body data-page="discover">

  <a class="skip-link" href="#discover-main">Skip to results</a>

  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="./index.html" class="topbar__brand" aria-label="WanderAlt home">
        <span class="logo-mark" aria-hidden="true"><span class="logo-mark__diamond"></span></span>
        <span class="wordmark">WanderAlt</span>
      </a>
      <button class="city-selector" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="city-dot" aria-hidden="true"></span>
        <span class="city-selector__name">TALLINN</span>
        <span class="city-selector__chev" aria-hidden="true">
          <svg viewBox="0 0 10 10"><path d="M1.5 3.5 L5 7 L8.5 3.5" /></svg>
        </span>
      </button>
    </div>
  </header>

  <main id="discover-main" class="page" role="main">

    <p class="print-head" aria-hidden="true"></p>

    <!-- Events | Places scope switch. The permanent thing (a venue) and
         the dated thing (an event) are different objects, so this is a
         scoped toggle, not a filter facet (RA / Google Maps pattern).
         It sits above search because it scopes everything below it.
         discover.js reads/writes &type=events|places. -->
    <div class="discover-scope" role="tablist" aria-label="Browse events or places">
      <button class="discover-scope__btn discover-scope__btn--on" type="button"
              role="tab" aria-selected="true" data-type="events">Events</button>
      <button class="discover-scope__btn" type="button"
              role="tab" aria-selected="false" data-type="places">Places</button>
    </div>

    <!-- Compact search bar. Icon expands the input on tap (mobile);
         the AI "match me" toggle is a thin link below.                -->
    <section class="discover-search" aria-labelledby="discover-search-label" data-mode="search">
      <label id="discover-search-label" class="visually-hidden" for="discover-q">Search WanderAlt</label>
      <form role="search" data-no-submit>
        <div class="search-box discover-search__box">
          <span class="search-box__icon search-box__icon--search" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="9" cy="9" r="5.5"/><line x1="13.2" y1="13.2" x2="17" y2="17"/>
            </svg>
          </span>
          <input
            id="discover-q"
            class="search-input"
            type="search"
            name="q"
            placeholder="Search anything&hellip;"
            autocomplete="off"
            spellcheck="false"
            enterkeyhint="search" />
          <!-- AI toggle ✦ — always visible right of the input. Muted in
               keyword mode, petrol when AI mode is active. Tap to toggle.
               The mode signal is in the icon state + border tint, not a
               separate text affordance below the field (2026 pattern). -->
          <button class="search-box__ai-btn" id="discover-match-toggle" type="button"
                  aria-label="AI search — describe what you want" aria-pressed="false">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 2.5l1.4 3.6L14 7.5l-3.6 1.4L9 12.5 7.6 8.9 4 7.5l3.6-1.4z"/>
              <path d="M15 12l.7 1.8L17.5 14.5l-1.8.7L15 17l-.7-1.8L12.5 14.5l1.8-.7z"/>
            </svg>
          </button>
          <button class="search-box__clear" id="discover-clear" type="button" aria-label="Clear search" hidden>
            <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/>
            </svg>
          </button>
        </div>
      </form>
      <!-- Example prompts — shown when AI mode is active and the field is
           empty. Teach the natural-language capability on first entry.
           discover.js shows/hides via [hidden] and data-prompt clicks. -->
      <div class="discover-ai-examples" id="discover-ai-examples" hidden>
        <button type="button" class="discover-ai-example" data-prompt="quiet wine bar tonight">quiet wine bar tonight</button>
        <button type="button" class="discover-ai-example" data-prompt="vinyl and late night dancing">vinyl &amp; dancing</button>
        <button type="button" class="discover-ai-example" data-prompt="something free this week">something free</button>
      </div>
    </section>

    <!-- Quick-filter pills. Mode-aware: Events shows time/free shortcuts,
         Places shows the most common venue-kind shortcuts. discover.js
         toggles [data-mode] visibility. + Filters is shared. -->
    <nav class="discover-pills" aria-label="Quick filters">
      <button class="discover-pill" type="button" data-pill="tonight"  data-mode="events">Tonight</button>
      <button class="discover-pill" type="button" data-pill="thisweek" data-mode="events">This week</button>
      <button class="discover-pill" type="button" data-pill="free"     data-mode="events">Free</button>
      <button class="discover-pill" type="button" data-pill="kind:record store" data-mode="places" hidden>Record stores</button>
      <button class="discover-pill" type="button" data-pill="kind:bookshop"     data-mode="places" hidden>Bookshops</button>
      <button class="discover-pill" type="button" data-pill="kind:gallery"      data-mode="places" hidden>Galleries</button>
      <button class="discover-pill discover-pill--more" type="button" id="discover-filters-btn">
        + Filters
        <span class="discover-pill__count" id="discover-filter-count" hidden>0</span>
      </button>
    </nav>

    <!-- Mood chips — mood-chips.js renders chip buttons here. -->
    <nav class="mood-chips" aria-label="Filter by mood"></nav>

    <!-- Applied-filters overview — removable chips for the category /
         neighborhood filters hidden inside the sheet, so users can see
         and clear them without reopening it (Baymard: cheapest
         orientation win). Hidden when no sheet filters are active;
         discover.js renders it. -->
    <div class="discover-applied" id="discover-applied" aria-label="Active filters" hidden></div>

    <!-- View panes: list (default) and map. Mobile shows one at a time
         via the view-toggle FAB; desktop ≥1024px shows both side-by-side. -->
    <div class="discover-panes" id="discover-panes" data-view="list">

      <!-- List pane ------------------------------------------------- -->
      <div class="discover-pane discover-pane--list" data-pane="list">

        <!-- Filters. Mobile: a bottom sheet opened by "+ Filters" (position
             fixed, so its place in the list pane is irrelevant there).
             Desktop ≥1024px: a persistent left-rail atop the list column
             (static, always visible, live-apply, "+ Filters"/Apply hidden). -->
        <aside class="discover-sheet" id="discover-sheet" aria-label="Filters" hidden>
          <div class="discover-sheet__handle" aria-hidden="true"></div>
          <header class="discover-sheet__head">
            <h2 class="discover-sheet__title">Filters</h2>
            <!-- Desktop rail's reset (the footer Clear is hidden there).
                 Shown only on desktop and only when a filter is active. -->
            <button class="discover-sheet__clear-top" id="discover-rail-clear" type="button" hidden>Clear</button>
            <button class="discover-sheet__close" id="discover-sheet-close" type="button" aria-label="Close">&times;</button>
          </header>
          <div class="discover-sheet__body">
            <fieldset class="discover-sheet__field">
              <legend class="eyebrow">Category</legend>
              <div class="discover-sheet__chips" id="discover-cat-chips"></div>
            </fieldset>
            <fieldset class="discover-sheet__field">
              <legend class="eyebrow">Neighborhood</legend>
              <div class="discover-sheet__chips" id="discover-nhood-chips"></div>
            </fieldset>
            <fieldset class="discover-sheet__field">
              <legend class="eyebrow">Sort</legend>
              <!-- Radio list, not a <select> (Baymard: visible options beat a
                   dropdown under ~5 choices). Options populated per mode. -->
              <div class="discover-sort" id="discover-sort" role="radiogroup" aria-label="Sort"></div>
            </fieldset>
          </div>
          <footer class="discover-sheet__foot">
            <button class="discover-sheet__clear" id="discover-sheet-clear" type="button">Clear all</button>
            <button class="btn-primary discover-sheet__apply" id="discover-sheet-apply" type="button">Apply</button>
          </footer>
        </aside>

        <!-- AI match results — populated by discover.js when AI mode is active. -->
        <section class="match-wrap" id="discover-match-wrap" aria-label="AI match results" hidden>
          <div class="match-result" id="discover-match-result" aria-live="polite"></div>
          <!-- Action row: retry + copy-link. Both shown/hidden together by JS. -->
          <button class="match-again" id="discover-match-again" type="button" hidden>
            Try again &rarr;
          </button>
          <button class="match-copy-link" id="discover-match-copy-link" type="button"
                  aria-label="Copy link to these results" hidden>
            <svg viewBox="0 0 20 20" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8.5 11.5a3.5 3.5 0 0 0 5 0l2.5-2.5a3.5 3.5 0 0 0-5-5L9.5 5.5"/>
              <path d="M11.5 8.5a3.5 3.5 0 0 0-5 0L4 11a3.5 3.5 0 0 0 5 5l1.5-1.5"/>
            </svg>
            Copy link
          </button>
        </section>

        <!-- Keyword / filter results — shown when input has a value or any filter is active. -->
        <section id="discover-results-section" aria-label="Results" hidden>
          <header class="search-section-head search-section-head--sort">
            <div>
              <p class="eyebrow">Results</p>
              <p class="meta" id="discover-results-count" aria-live="polite"></p>
            </div>
          </header>
          <ol class="list-rows" id="discover-results" role="list"></ol>
          <p class="meta" id="discover-empty" hidden></p>
        </section>

        <!-- Browse sections — hidden when filters are active.
             Each <ul> ships with skeleton rows so the layout settles
             on first paint instead of jolting in once discover.js
             finishes populateBrowse(). populateBrowse() replaces the
             skeletons via innerHTML when the catalog is ready.       -->
        <section class="discover-browse-section search-browse-section" aria-labelledby="curators-label">
          <header class="search-section-head">
            <p id="curators-label" class="eyebrow">Curators</p>
            <p class="meta">&nbsp;</p>
          </header>
          <ul class="curator-rows" aria-busy="true">
            <li class="skeleton-row" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--tagline"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--tagline"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--tagline"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
          </ul>
        </section>

        <section class="discover-browse-section search-browse-section" aria-labelledby="neighborhoods-label">
          <header class="search-section-head">
            <p id="neighborhoods-label" class="eyebrow">Neighborhoods</p>
            <p class="meta">&nbsp;</p>
          </header>
          <ul class="browse-rows" aria-busy="true">
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
          </ul>
        </section>

        <section class="discover-browse-section search-browse-section" aria-labelledby="kinds-label">
          <header class="search-section-head">
            <p id="kinds-label" class="eyebrow">By kind</p>
            <p class="meta">&nbsp;</p>
          </header>
          <ul class="browse-rows" aria-busy="true">
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
            <li class="skeleton-row skeleton-row--simple" aria-hidden="true">
              <span class="skeleton-row__line skeleton-row__line--label"></span>
              <span class="skeleton-row__line skeleton-row__line--count"></span>
            </li>
          </ul>
        </section>
      </div>

      <!-- Map pane -------------------------------------------------- -->
      <!-- map.js binds to these DOM IDs for the pin/cluster layer;
           map-tiles.js mounts the MapLibre basemap into #map-canvas.
           Discover drives both via WA.MapView (events) and
           WA.MapView.setPlaces() (venue pins in Places mode).           -->
      <div class="discover-pane discover-pane--map" data-pane="map">
        <div class="map-viewport" id="map-viewport">
          <div id="map-canvas" class="map-canvas"></div>
          <div id="map-pins" class="map-pins" aria-live="polite"></div>
          <!-- Empty-state hint — visible when no filters are active. The
               default map view shows no pins to avoid clutter; pick a
               filter and the matching set appears. -->
          <div id="map-empty-hint" class="map-empty-hint" aria-live="polite">
            <p class="map-empty-hint__title">Pick a filter to see places</p>
            <p class="map-empty-hint__body">
              Tap <strong>Tonight</strong>, <strong>This week</strong>, <strong>Free</strong>,
              or open <strong>Filters</strong> for category or neighborhood.
            </p>
          </div>
        </div>

        <div class="map-zoom-ctrl" role="group" aria-label="Zoom controls">
          <button class="map-zoom-btn" id="btn-zoom-in"  aria-label="Zoom in">+</button>
          <button class="map-zoom-btn" id="btn-zoom-out" aria-label="Zoom out">&#8722;</button>
          <button class="map-zoom-btn map-zoom-btn--fit" id="btn-zoom-fit" aria-label="Fit map">&#8859;</button>
        </div>

        <button class="map-locate-fab" id="btn-locate" aria-label="Show my location">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6"/>
            <line x1="10" y1="1.5" x2="10" y2="4"    stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="10" y1="16"  x2="10" y2="18.5"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="1.5" y1="10" x2="4"   y2="10"   stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="16"  y1="10" x2="18.5" y2="10"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>

        <aside class="map-sheet" id="map-sheet" aria-label="Selected pin details" hidden></aside>
        <aside class="map-detail" id="map-detail" aria-label="Pin details" hidden></aside>
      </div>

    </div>

    <!-- View toggle FAB (mobile only) — flips between list and map panes. -->
    <button class="discover-view-fab" id="discover-view-toggle" type="button" aria-label="Switch to map view">
      <span class="discover-view-fab__label">Map</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z"/>
        <path d="M9 4v16M15 6v16"/>
      </svg>
    </button>

  </main>

  <!-- Mobile filter sheet backdrop (the sheet itself lives inside the
       list pane so it can become a persistent left-rail on desktop). -->
  <div class="discover-sheet-backdrop" id="discover-sheet-backdrop" hidden></div>

  <nav class="nav" aria-label="Primary">
    <div class="nav__inner">
      <a class="nav__item" data-nav="briefing" href="./index.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M5 3h11l3 3v15H5V3z"/><path d="M8 8h8M8 12h8M8 16h5"/>
        </svg>
        <span class="nav__label">Today</span>
      </a>
      <a class="nav__item" data-nav="discover" href="./discover.html" aria-current="page">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5"/>
        </svg>
        <span class="nav__label">Discover</span>
      </a>
      <a class="nav__item" data-nav="saved" href="./saved.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M6 3h12v18l-6-4-6 4V3z"/>
        </svg>
        <span class="nav__label">Saved</span>
      </a>
      <a class="nav__item" data-nav="profile" href="./profile.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.1-7 7-7s7 3 7 7"/>
        </svg>
        <span class="nav__label">Profile</span>
      </a>
    </div>
  </nav>

</body>
</html>
