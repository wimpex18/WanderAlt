<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WanderAlt — Map · Tallinn</title>
  <meta name="description" content="A curator's map of Tallinn. Every pin has a human who vouched for it." />
  <meta name="theme-color" content="#ffffff" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="./catalog.js"></script>
  <script defer src="./city.js"></script>
  <script defer src="./supabase.js"></script>
  <script defer src="./auth.js"></script>
  <script defer src="./bookmark.js"></script>
  <script defer src="./mood-chips.js"></script>
  <script defer src="./map.js"></script>
</head>
<body data-page="map">

  <a class="skip-link" href="#map-main">Skip to map</a>

  <!-- Top bar — shared across pages -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="./index.html" class="topbar__brand" aria-label="WanderAlt home">
        <span class="logo-mark" aria-hidden="true"><span class="logo-mark__diamond"></span></span>
        <span class="wordmark">WanderAlt</span>
      </a>
      <button class="city-selector" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="city-dot" aria-hidden="true"></span>
        <span class="city-selector__name">TALLINN</span>
        <span class="city-selector__chev" aria-hidden="true">
          <svg viewBox="0 0 10 10"><path d="M1.5 3.5 L5 7 L8.5 3.5" /></svg>
        </span>
      </button>
    </div>
  </header>

  <main id="map-main" class="page" role="main">

    <!-- Print masthead (hidden on screen, shown in @media print). -->
    <p class="print-head" aria-hidden="true"></p>

    <!-- Full-bleed map. Escapes .page's gutter via negative margins.
         On mobile fills viewport between topbar and nav; on desktop
         caps at a fixed printed-plate panel. Matches handoff map.jsx. -->
    <section class="map-bleed" aria-label="Curator's map of Tallinn">

      <!-- Hand-drawn city plane: sea wedge, river, neighborhood blobs,
           street hatching, district labels. Grayscale wireframe on paper. -->
      <svg class="map-plane" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <pattern id="wa-hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
            <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.15" opacity="0.35" />
          </pattern>
        </defs>

        <!-- Sea / bay — top-left wedge -->
        <path d="M 0,0 L 38,0 L 30,18 L 12,28 L 0,22 Z" fill="url(#wa-hatch)" opacity="0.5" />

        <!-- River snaking across -->
        <path d="M -2,44 C 18,40 32,52 48,48 C 66,44 82,58 102,54"
              stroke="#1a1a1a" stroke-width="0.3" fill="none" opacity="0.5" />

        <!-- Dashed neighborhood blobs -->
        <path d="M 14,50 C 10,38 24,30 36,34 C 48,36 42,56 28,60 C 18,62 16,58 14,50 Z"
              fill="none" stroke="#1a1a1a" stroke-width="0.35" opacity="0.7" stroke-dasharray="1 1.2" />
        <path d="M 54,22 C 48,20 46,32 54,38 C 66,44 76,34 72,24 C 70,18 60,18 54,22 Z"
              fill="none" stroke="#1a1a1a" stroke-width="0.35" opacity="0.7" stroke-dasharray="1 1.2" />
        <path d="M 58,62 C 52,62 50,74 60,80 C 74,86 86,76 82,66 C 80,60 66,60 58,62 Z"
              fill="none" stroke="#1a1a1a" stroke-width="0.35" opacity="0.7" stroke-dasharray="1 1.2" />
        <path d="M 36,70 C 30,72 30,84 40,86 C 50,88 54,80 50,72 C 48,68 40,68 36,70 Z"
              fill="none" stroke="#1a1a1a" stroke-width="0.35" opacity="0.7" stroke-dasharray="1 1.2" />

        <!-- Street ticks — very faint grid -->
        <g stroke="#1a1a1a" stroke-width="0.08" opacity="0.25">
          <line x1="0" y1="6"  x2="100" y2="6" />
          <line x1="0" y1="13" x2="100" y2="13" />
          <line x1="0" y1="20" x2="100" y2="20" />
          <line x1="0" y1="27" x2="100" y2="27" />
          <line x1="0" y1="34" x2="100" y2="34" />
          <line x1="0" y1="41" x2="100" y2="41" />
          <line x1="0" y1="48" x2="100" y2="48" />
          <line x1="0" y1="55" x2="100" y2="55" />
          <line x1="0" y1="62" x2="100" y2="62" />
          <line x1="0" y1="69" x2="100" y2="69" />
          <line x1="0" y1="76" x2="100" y2="76" />
          <line x1="0" y1="83" x2="100" y2="83" />
          <line x1="0" y1="90" x2="100" y2="90" />
          <line x1="0" y1="97" x2="100" y2="97" />

          <line x1="6"  y1="0" x2="6"  y2="100" />
          <line x1="13" y1="0" x2="13" y2="100" />
          <line x1="20" y1="0" x2="20" y2="100" />
          <line x1="27" y1="0" x2="27" y2="100" />
          <line x1="34" y1="0" x2="34" y2="100" />
          <line x1="41" y1="0" x2="41" y2="100" />
          <line x1="48" y1="0" x2="48" y2="100" />
          <line x1="55" y1="0" x2="55" y2="100" />
          <line x1="62" y1="0" x2="62" y2="100" />
          <line x1="69" y1="0" x2="69" y2="100" />
          <line x1="76" y1="0" x2="76" y2="100" />
          <line x1="83" y1="0" x2="83" y2="100" />
          <line x1="90" y1="0" x2="90" y2="100" />
          <line x1="97" y1="0" x2="97" y2="100" />
        </g>

        <!-- Neighborhood labels — mono, small, ink-muted.
             Opacity lowered so numbered pins clearly win z-attention.
             x-coords nudged inward so nothing clips at wide aspect ratios. -->
        <g font-family="'JetBrains Mono', ui-monospace, monospace"
           font-size="1.6" fill="#6b6b6b" letter-spacing="0.35" opacity="0.65">
          <text x="18" y="48">KALAMAJA</text>
          <text x="55" y="25">VANALINN</text>
          <text x="57" y="68">TELLISKIVI</text>
          <text x="35" y="80">PÕHJA</text>
        </g>
      </svg>

      <!-- Filter chips, overlaid at the top — time/type filters -->
      <nav class="map-filters" aria-label="Map filters">
        <button class="m-chip m-chip--on" type="button">All</button>
        <button class="m-chip" type="button">Tonight</button>
        <button class="m-chip" type="button">This week</button>
        <button class="m-chip" type="button">Places</button>
        <button class="m-chip" type="button" id="chip-nearby">Nearby</button>
      </nav>

      <!-- Mood chips — second row, populated by mood-chips.js -->
      <nav class="map-filters map-filters--mood mood-chips" aria-label="Filter by mood"></nav>

      <!-- Compass, top-right -->
      <div class="map-compass" aria-hidden="true">
        <span class="map-compass__arrow">↑</span>
        N
      </div>

      <!-- Teardrop pins — positioned by % coords from map.jsx.
           Pin 1 starts selected (aria-pressed="true"); CSS drives
           the accent fill so the inline SVG attrs are now uniform.
           Pin payload (eyebrow/title/meta/quote/handle) lives on
           data-* attributes; map.js reads them on click and
           swaps the sheet content. -->
      <!-- 1. Sveta Baar · Kalamaja · tonight -->
      <button class="map-pin" type="button" style="left:34%;top:38%"
              aria-label="Pin 1: Noise Night at Sveta Baar"
              aria-pressed="true"
              data-pin="1">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">1</text>
        </svg>
      </button>
      <!-- 2. Fotografiska · Vanalinn · talk -->
      <button class="map-pin" type="button" style="left:58%;top:30%"
              aria-label="Pin 2: Ethics of failure — a lecture"
              data-pin="2">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">2</text>
        </svg>
      </button>
      <!-- 3. Paavli · gig -->
      <button class="map-pin" type="button" style="left:22%;top:58%"
              aria-label="Pin 3: Estonia-Georgia tape split"
              data-pin="3">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">3</text>
        </svg>
      </button>
      <!-- 4. Kai Art Center -->
      <button class="map-pin" type="button" style="left:72%;top:52%"
              aria-label="Pin 4: Marge Monko — Soft Power"
              data-pin="4">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">4</text>
        </svg>
      </button>
      <!-- 5. Turntable Tallinn -->
      <button class="map-pin" type="button" style="left:46%;top:70%"
              aria-label="Pin 5: Turntable Tallinn"
              data-pin="5">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">5</text>
        </svg>
      </button>
      <!-- 6. Võta või Jäta -->
      <button class="map-pin" type="button" style="left:64%;top:76%"
              aria-label="Pin 6: Võta või Jäta"
              data-pin="6">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">6</text>
        </svg>
      </button>
      <!-- 7. Köögi Galerii -->
      <button class="map-pin" type="button" style="left:28%;top:22%"
              aria-label="Pin 7: Köögi Galerii"
              data-pin="7">
        <svg width="28" height="36" viewBox="0 0 28 36" aria-hidden="true">
          <path d="M14 1 C 5 1 1 8 1 14 C 1 22 14 35 14 35 C 14 35 27 22 27 14 C 27 8 23 1 14 1 Z"
                stroke-width="1.2" stroke-linejoin="round" />
          <text x="14" y="18" text-anchor="middle"
                font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">7</text>
        </svg>
      </button>

      <!-- Peek bottom sheet — static, shows the selected pin.
           The `pos` indicator tells the user this is 1 of 7 pins;
           a missing affordance in v1 that made the sheet feel dead-end. -->
      <aside class="map-sheet" aria-label="Selected pin details">
        <div class="map-sheet__handle" aria-hidden="true"></div>
        <div class="map-sheet__head">
          <div class="map-sheet__num" aria-hidden="true">1</div>
          <div class="map-sheet__body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
              <span class="map-sheet__tonight">
                <span class="map-sheet__tonight-dot" aria-hidden="true"></span>
                Tonight
              </span>
              <p class="map-sheet__pos" style="position:static;font-size:11px;" aria-label="Pin 1 of 7">
                <strong>01</strong>&thinsp;/&thinsp;07
              </p>
            </div>
            <p class="map-sheet__title"><a href="venue.html?id=noise-night-sveta-baar">Noise Night at Sveta Baar</a></p>
            <p class="meta">Kalamaja &middot; noise &middot; 22:00</p>
          </div>
          <button class="map-sheet__close" type="button" aria-label="Close pin details">&times;</button>
        </div>
        <p class="map-sheet__quote">
          &ldquo;Not for the faint-hearted. Bring earplugs and an open mind.&rdquo;
          <span class="handle">— sigmundtells</span>
        </p>
        <div class="map-sheet__foot">
          <a class="btn-primary map-sheet__cta" href="venue.html?id=noise-night-sveta-baar" style="font-size:13px;padding:10px 0;text-align:center;">I&rsquo;m going &rarr;</a>
          <label class="btn-secondary bookmark" style="padding:8px 12px;">
            <input type="checkbox" class="bookmark__check map-sheet__bookmark"
                   data-id="noise-night-sveta-baar" aria-label="Save this pick" />
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 3h12v18l-6-4-6 4V3z" />
            </svg>
            Save
          </label>
        </div>
      </aside>

    </section>

  </main>

  <!-- Bottom nav (mobile) / top masthead (desktop) -->
  <nav class="nav" aria-label="Primary">
    <div class="nav__inner">      <a class="nav__item" data-nav="briefing" href="./index.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M5 3h11l3 3v15H5V3z" />
          <path d="M8 8h8M8 12h8M8 16h5" />
        </svg>
        <span class="nav__label">Briefing</span>
      </a>
      <a class="nav__item" data-nav="map" href="./map.html" aria-current="page">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z" />
          <path d="M9 4v16M15 6v16" />
        </svg>
        <span class="nav__label">Map</span>
      </a>
      <a class="nav__item" data-nav="search" href="./search.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="11" cy="11" r="6" />
          <path d="M20 20l-4.5-4.5" />
        </svg>
        <span class="nav__label">Search</span>
      </a>
      <a class="nav__item" data-nav="saved" href="./saved.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <path d="M6 3h12v18l-6-4-6 4V3z" />
        </svg>
        <span class="nav__label">Saved</span>
      </a>
      <a class="nav__item" data-nav="profile" href="./profile.html">
        <svg class="nav__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M5 20c0-4 3.1-7 7-7s7 3 7 7" />
        </svg>
        <span class="nav__label">Profile</span>
      </a>    </div>
  </nav>

</body>
</html>
